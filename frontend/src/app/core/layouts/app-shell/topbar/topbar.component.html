<nav class="bg-white border-b border-slate-100 px-4 py-2.5 fixed left-0 right-0 top-0 z-50">
  <div class="flex justify-between items-center w-full">
    <div class="flex justify-start items-center gap-4">
      <button (click)="toggleSidebar.emit()"
        class="p-2 mr-3 text-slate-500 rounded-lg cursor-pointer md:hidden hover:text-slate-900 hover:bg-slate-50 transition-colors">
        <svg lucideMenu class="w-6 h-6"></svg>
        <span class="sr-only">Toggle sidebar</span>
      </button>
      <a href="/marketplace" class="flex items-center gap-1">
        <div class="flex items-center justify-center w-12">
          <img src="/logo-revaloraIA.png" alt="revalora-IA" class="w-full h-full">
        </div>
        <h1 class="text-2xl font-normal  text-black">Revalora <span
            class="font-extrabold tracking-tight text-emerald-700">IA</span></h1>
      </a>
    </div>
    @if (isAuthenticated()) {
    <div class="flex items-center lg:order-2 space-x-2">
      <button type="button"
        class="p-2 text-slate-400 rounded-lg hover:text-slate-900 hover:bg-slate-50 transition-colors">
        <span class="sr-only">View notifications</span>
        <svg lucideBell class="w-6 h-6"></svg>
      </button>
      <button type="button" class="flex items-center space-x-3 ml-2 group" id="user-menu-button">
        <div
          class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-700 font-bold text-xs border border-slate-200 overflow-hidden group-hover:bg-slate-200 transition-colors">
          @if (avatarUrl()) {
          <div class="relative h-full w-full">
            @if (!avatarLoaded) {
              <div class="absolute inset-0 z-10 grid place-items-center bg-white/60">
                <img src="/loader.gif" alt="Cargando avatar" class="w-8 h-8" />
              </div>
            }
            <img [src]="avatarUrl()! || fallbackImage" [alt]="displayName()" class="h-full w-full object-cover" loading="lazy" (load)="onAvatarLoad()" (error)="onAvatarError($event)" />
          </div>
          } @else {
          {{ initials() }}
          }
        </div>
        <span class="hidden md:block text-sm font-medium text-slate-700">{{ displayName() }}</span>
      </button>
    </div>
    }
  </div>
</nav>
