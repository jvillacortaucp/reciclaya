<div class="selector-grid" role="radiogroup" aria-label="Tipo de cuenta">
  @for (option of options; track option.value) {
    <button
      type="button"
      class="selector-card"
      [class.selector-card-active]="selected === option.value"
      role="radio"
      [attr.aria-checked]="selected === option.value"
      (click)="select(option.value)"
    >
      <span class="selector-icon" aria-hidden="true">
        @if (option.icon === 'building-2') {
          <svg lucideBuilding2 size="18"></svg>
        } @else {
          <svg lucideUserRound size="18"></svg>
        }
      </span>
      <span class="selector-title">{{ option.title }}</span>
      <span class="selector-description">{{ option.description }}</span>
    </button>
  }
</div>
