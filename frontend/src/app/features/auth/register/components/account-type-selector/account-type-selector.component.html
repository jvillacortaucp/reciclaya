<div class="grid grid-cols-1 gap-3 sm:grid-cols-2" role="radiogroup" aria-label="Tipo de cuenta">
  @for (option of options; track option.value) {
    <button
      type="button"
      class="grid gap-1 rounded-2xl border bg-white p-4 text-left transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400/70"
      [class.border-emerald-500]="selected === option.value"
      [class.bg-emerald-50]="selected === option.value"
      [class.ring-2]="selected === option.value"
      [class.ring-emerald-200]="selected === option.value"
      [class.border-slate-200]="selected !== option.value"
      [class.hover:border-slate-300]="selected !== option.value"
      [class.hover:-translate-y-0.5]="selected !== option.value"
      role="radio"
      [attr.aria-checked]="selected === option.value"
      (click)="select(option.value)"
    >
      <span class="inline-grid h-8 w-8 place-items-center rounded-xl bg-slate-100 text-teal-700" aria-hidden="true">
        @if (option.icon === 'building-2') {
          <svg lucideBuilding2 size="18"></svg>
        } @else {
          <svg lucideUserRound size="18"></svg>
        }
      </span>
      <span class="font-semibold text-slate-900">{{ option.title }}</span>
      <span class="text-xs text-slate-500">{{ option.description }}</span>
    </button>
  }
</div>
