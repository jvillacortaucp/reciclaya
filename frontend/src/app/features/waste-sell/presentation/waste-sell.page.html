<ui-section-header title="Publicar residuo" subtitle="Registra volumen, calidad y condiciones de entrega" />
<ui-stepper [steps]="['Datos', 'Logistica', 'Revision']" [activeStep]="1" />
<form class="mt-4 grid gap-4 rounded-2xl border border-slate-200 bg-white p-4 shadow-soft" [formGroup]="form">
  <div class="grid gap-3 md:grid-cols-2">
    <label class="grid gap-1 text-sm"><span>Titulo</span><input class="rounded-xl border border-slate-300 px-3 py-2" formControlName="title" /></label>
    <label class="grid gap-1 text-sm"><span>Categoria</span><input class="rounded-xl border border-slate-300 px-3 py-2" formControlName="category" /></label>
  </div>
  <label class="grid gap-1 text-sm"><span>Descripcion</span><textarea class="rounded-xl border border-slate-300 px-3 py-2" rows="4" formControlName="description"></textarea></label>
  <div class="grid gap-3 md:grid-cols-3">
    <label class="grid gap-1 text-sm"><span>Precio por unidad (USD)</span><input class="rounded-xl border border-slate-300 px-3 py-2" type="number" formControlName="pricePerUnit" /></label>
    <label class="grid gap-1 text-sm"><span>Volumen</span><input class="rounded-xl border border-slate-300 px-3 py-2" type="number" formControlName="volume" /></label>
    <label class="grid gap-1 text-sm"><span>Unidad</span><select class="rounded-xl border border-slate-300 px-3 py-2" formControlName="unit"><option value="kg">kg</option><option value="ton">ton</option></select></label>
  </div>
  <label class="grid gap-1 text-sm"><span>Ubicacion</span><input class="rounded-xl border border-slate-300 px-3 py-2" formControlName="location" /></label>
  <ui-upload-dropzone label="Adjunta evidencia de calidad o fotos del material" />
  <div class="flex flex-wrap gap-2">
    <button type="button" class="rounded-xl border border-slate-300 px-4 py-2 text-sm hover:bg-slate-50" (click)="saveDraft()">Guardar borrador</button>
    <button type="button" class="rounded-xl bg-primary-600 px-4 py-2 text-sm text-white hover:bg-primary-700" (click)="publish()">Publicar</button>
  </div>
</form>
