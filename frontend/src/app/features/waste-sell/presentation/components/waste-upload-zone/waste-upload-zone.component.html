<section class="grid gap-2.5">
  <label
    class="cursor-pointer rounded-2xl border border-dashed border-slate-300 bg-slate-50 px-5 py-7 text-center transition-colors hover:border-slate-400"
    [class.border-emerald-500]="dragActive()"
    [class.bg-emerald-50]="dragActive()"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <input type="file" accept="image/*" class="hidden" [disabled]="disabled" (change)="onFileInput($event)" multiple />
    <span class="inline-grid h-9 w-9 place-items-center rounded-xl bg-emerald-100 text-emerald-700"><svg lucideImageUp size="18"></svg></span>
    <p class="mt-3 text-sm text-slate-700">Arrastre fotos aqui o <span class="text-emerald-700 underline">busque en su equipo</span></p>
    <p class="mt-1.5 text-xs text-slate-500">Formatos aceptados: JPG, PNG (min. 800x600)</p>
  </label>

  @if (!mediaUploads.length) {
    <p class="text-xs text-slate-500" animate.enter="fade-in">Sin imagenes cargadas todavia.</p>
  } @else {
    <div class="flex flex-wrap gap-2.5" animate.enter="fade-in">
      @for (media of mediaUploads; track media.id) {
        <article class="relative h-[4.8rem] w-[4.8rem] overflow-hidden rounded-xl border border-slate-300">
          <img [src]="media.previewUrl" [alt]="media.name" />
          <button type="button" class="absolute right-1 top-1 grid h-5 w-5 place-items-center rounded-full bg-slate-900/70 text-white" (click)="removeFile(media.id)" [disabled]="disabled" aria-label="Eliminar imagen">
            <svg lucideTrash2 size="14"></svg>
          </button>
        </article>
      }

      @if (mediaUploads.length < maxFiles) {
        <label class="grid h-[4.8rem] w-[4.8rem] cursor-pointer place-items-center rounded-xl border border-dashed border-slate-300 bg-white text-slate-400">
          <input type="file" accept="image/*" class="hidden" [disabled]="disabled" (change)="onFileInput($event)" multiple />
          <svg lucidePlus size="16"></svg>
        </label>
      }
    </div>
  }
</section>
