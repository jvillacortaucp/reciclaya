<label class="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm">
  <svg lucideCalendarDays class="h-4 w-4 text-slate-500"></svg>
  <select
    class="min-w-40 border-none bg-transparent p-0 text-sm font-medium text-slate-700 focus:outline-none focus:ring-0"
    [value]="selectedPeriod()"
    (change)="onChange($event)">
    @for (option of options; track option.value) {
      <option [value]="option.value">{{ option.label }}</option>
    }
  </select>
</label>
