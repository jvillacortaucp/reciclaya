<section class="mx-auto flex h-[calc(100vh-4rem)] w-full max-w-[1720px] flex-col overflow-hidden px-3 pb-3 pt-4 sm:px-6 lg:px-8">
  <header class="mb-3 flex flex-wrap items-end justify-between gap-2">
    <div>
      <div class="flex items-center gap-3">
        <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-emerald-600 to-teal-600 bg-clip-text text-transparent sm:text-4xl">
          ReciclaIA
        </h1>
        <div class="inline-flex items-center gap-1.5 rounded-full bg-emerald-50 px-2.5 py-1 border border-emerald-100 shadow-sm animate-fade-in">
          <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
          </span>
          <span class="text-xs font-medium text-emerald-700">En línea</span>
        </div>
      </div>
      <p class="mt-1.5 max-w-3xl text-sm leading-relaxed text-slate-500 sm:text-base">{{ copy.subtitle }}</p>
    </div>
    <button
      type="button"
      class="inline-flex h-10 items-center gap-2 rounded-xl border border-slate-300 bg-white px-3 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
      (click)="clearConversation()">
      <svg lucideTrash2 class="h-4 w-4"></svg>
      Limpiar conversación
    </button>
  </header>

  <div #chatContainer class="flex-1 overflow-y-auto rounded-3xl border border-slate-200/80 bg-slate-50/40 backdrop-blur-sm p-3 md:p-5 shadow-inner scroll-smooth">
    <div class="mx-auto min-h-[180px] w-full max-w-[1380px] space-y-3 md:min-h-[220px] md:space-y-4">
      @for (message of messages(); track message.id) {
        @if (message.type === 'text') {
          <app-chat-message-bubble [message]="message" />
        } @else {
          <div class="pl-0 sm:pl-12">
            <app-product-suggestion-cards
              [suggestions]="message.suggestions ?? []"
              (selected)="onProductSelected($event)" />
          </div>
        }
      }

      @if (typing()) {
        <app-typing-indicator />
      }
    </div>
  </div>

  <footer class="mt-3 rounded-3xl border border-slate-200/80 bg-white/80 backdrop-blur-sm px-4 py-4 shadow-sm">
    <div class="mx-auto w-full max-w-[1380px]">
      <div class="mb-3 flex flex-wrap items-center gap-3">
        <p class="text-xs font-bold uppercase tracking-wider text-slate-400">{{ copy.suggestionsLabel }}</p>
        <app-quick-suggestion-chips
          [suggestions]="quickSuggestions"
          (selected)="applySuggestion($event)" />
      </div>

      <app-chat-input
        [control]="form.controls.input"
        [placeholder]="copy.inputPlaceholder"
        [disabled]="typing()"
        (submitted)="sendMessage()" />
    </div>
  </footer>
</section>
