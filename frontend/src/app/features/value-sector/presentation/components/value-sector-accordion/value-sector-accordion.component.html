<div class="space-y-4">
  @for (route of routes(); track route.id) {
    <article
      class="rounded-3xl border bg-white shadow-sm transition-all duration-300"
      [class.border-emerald-400]="selectedRouteId() === route.id"
      [class.ring-2]="selectedRouteId() === route.id"
      [class.ring-emerald-100]="selectedRouteId() === route.id"
      [class.border-slate-200]="selectedRouteId() !== route.id">
      <button
        type="button"
        class="w-full p-5 text-left sm:p-6"
        (click)="onToggleRoute(route.id)">
        <div class="flex items-start justify-between gap-4">
          <div class="min-w-0 flex items-start gap-4">
            <span
              class="inline-flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl"
              [class.bg-emerald-100]="selectedRouteId() === route.id || expandedRouteId() === route.id"
              [class.text-emerald-700]="selectedRouteId() === route.id || expandedRouteId() === route.id"
              [class.bg-slate-100]="selectedRouteId() !== route.id && expandedRouteId() !== route.id"
              [class.text-slate-500]="selectedRouteId() !== route.id && expandedRouteId() !== route.id">
              @switch (route.iconName) {
                @case ('utensils') { <svg lucideUtensils class="h-6 w-6"></svg> }
                @case ('sparkles') { <svg lucideSparkles class="h-6 w-6"></svg> }
                @case ('pill') { <svg lucidePill class="h-6 w-6"></svg> }
                @case ('sprout') { <svg lucideSprout class="h-6 w-6"></svg> }
                @case ('flame') { <svg lucideFlame class="h-6 w-6"></svg> }
                @case ('microscope') { <svg lucideMicroscope class="h-6 w-6"></svg> }
                @case ('flask-conical') { <svg lucideFlaskConical class="h-6 w-6"></svg> }
                @case ('droplets') { <svg lucideDroplets class="h-6 w-6"></svg> }
                @case ('hammer') { <svg lucideHammer class="h-6 w-6"></svg> }
                @case ('store') { <svg lucideStore class="h-6 w-6"></svg> }
                @default { <svg lucidePackage class="h-6 w-6"></svg> }
              }
            </span>
            <div class="min-w-0">
              <h3 class="text-xl font-semibold leading-tight text-slate-900 sm:text-2xl">{{ route.routeName }}</h3>
              <p class="mt-1 line-clamp-2 text-sm leading-relaxed text-slate-600 sm:text-base">
                {{ route.shortDescription }}
              </p>
              <p class="mt-3 text-xs font-semibold uppercase tracking-[0.14em] text-slate-500">
                {{ route.products.length }} productos sugeridos
              </p>
            </div>
          </div>

          <div class="shrink-0 text-right">
            <p class="text-xs font-semibold uppercase tracking-[0.14em] text-slate-500">Potencial comercial</p>
            <p class="mt-1 text-lg font-semibold text-emerald-700">
              {{ potentialLabel[route.marketPotential] }}
            </p>
            <span class="mt-3 inline-flex h-9 w-9 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-500">
              @if (expandedRouteId() === route.id) {
                <svg lucideChevronUp class="h-5 w-5"></svg>
              } @else {
                <svg lucideChevronDown class="h-5 w-5"></svg>
              }
            </span>
          </div>
        </div>
      </button>

      <div
        class="overflow-hidden transition-all duration-300"
        [class.max-h-0]="expandedRouteId() !== route.id"
        [ngClass]="expandedRouteId() === route.id ? 'max-h-[1200px]' : ''">
        <div class="border-t border-slate-100 p-5 sm:p-6">
          <app-value-sector-product-selector
            [products]="route.products"
            [selectedProductId]="selectedRouteId() === route.id ? selectedProductId() : null"
            (productSelected)="onProductSelected(route.id, $event)" />
        </div>
      </div>
    </article>
  }
</div>
