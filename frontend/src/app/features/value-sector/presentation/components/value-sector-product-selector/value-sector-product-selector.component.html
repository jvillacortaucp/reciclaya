<div data-tour="suggested-products-section" class="rounded-2xl bg-slate-50 p-4 sm:p-5">
  <p class="mb-3 text-xs font-semibold uppercase tracking-[0.16em] text-slate-500">Productos sugeridos</p>
  <div class="grid grid-cols-1 gap-3 lg:grid-cols-2">
    @for (product of products(); track product.id; let isFirstProduct = $first) {
      <button
        type="button"
        class="group rounded-2xl border p-4 text-left transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-emerald-300 cursor-pointer"
        [attr.data-tour]="tourFirstRoute() && isFirstProduct ? 'first-value-product' : null"
        [attr.data-tour-suggested-product]="isFirstProduct ? 'true' : null"
        [class.border-emerald-500]="selectedProductId() === product.id"
        [class.bg-emerald-50]="selectedProductId() === product.id"
        [class.shadow-sm]="selectedProductId() === product.id"
        [class.scale-[1.01]]="selectedProductId() === product.id"
        [class.border-slate-200]="selectedProductId() !== product.id"
        [class.bg-white]="selectedProductId() !== product.id"
        [class.hover:border-emerald-300]="selectedProductId() !== product.id"
        (click)="onSelectProduct(product.id)">
        <div class="flex items-start justify-between gap-3">
          <h4 class="text-base font-semibold text-slate-900">{{ product.name }}</h4>
          @if (selectedProductId() === product.id) {
            <svg lucideCheckCircle2 class="h-5 w-5 shrink-0 text-emerald-600"></svg>
          }
        </div>

        <p class="mt-1 line-clamp-2 text-sm leading-relaxed text-slate-600">{{ product.description }}</p>

        <div class="mt-3 flex flex-wrap items-center gap-2">
          <span class="rounded-full px-2.5 py-1 text-xs font-semibold" [class]="complexityStyles[product.complexity]">
            Complejidad {{ complexityLabel[product.complexity] }}
          </span>
          <span class="rounded-full px-2.5 py-1 text-xs font-semibold" [class]="potentialStyles[product.marketPotential]">
            Potencial {{ potentialLabel[product.marketPotential] }}
          </span>
        </div>
      </button>
    }
  </div>
</div>
