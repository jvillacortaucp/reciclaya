<div class="border-b border-slate-200">
  <div class="flex flex-wrap items-center gap-2 sm:gap-6">
    @for (tab of tabs; track tab.key) {
      <button
        type="button"
        class="relative h-12 px-1 text-[18px] font-medium transition focus:outline-none"
        [class.text-emerald-700]="activeTab() === tab.key"
        [class.text-slate-600]="activeTab() !== tab.key"
        [class.hover:text-slate-800]="activeTab() !== tab.key"
        (click)="onChangeTab(tab.key)">
        {{ tab.label }}
        <span
          class="absolute inset-x-0 -bottom-px h-0.5 rounded-full transition"
          [class.bg-emerald-700]="activeTab() === tab.key"
          [class.bg-transparent]="activeTab() !== tab.key"></span>
      </button>
    }
  </div>
</div>
