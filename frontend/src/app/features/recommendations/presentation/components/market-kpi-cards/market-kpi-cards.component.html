<section class="grid gap-3 md:grid-cols-3">
  @for (kpi of kpis(); track trackByKpi($index, kpi)) {
    <article class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
      <div class="flex items-center gap-3">
        <span
          [class]="toneClass(kpi.tone)"
          class="inline-flex h-10 w-10 items-center justify-center rounded-xl">
          @switch (kpi.id) {
            @case ('impact') {
              <svg lucideTrendingUp class="h-5 w-5"></svg>
            }
            @case ('demand') {
              <svg lucideUsers class="h-5 w-5"></svg>
            }
            @default {
              <svg lucideShieldCheck class="h-5 w-5"></svg>
            }
          }
        </span>

        <div class="min-w-0">
          <p class="text-xs uppercase tracking-[0.12em] text-slate-500">{{ kpi.label }}</p>
          <p class="text-[30px] font-semibold leading-tight text-slate-900">{{ kpi.value }}</p>
        </div>
      </div>

      <p class="mt-1 text-sm text-slate-500">{{ kpi.helper }}</p>
      <div class="mt-3 h-2 rounded-full bg-slate-100">
        <div class="h-2 rounded-full" [class]="progressClass(kpi.tone)" [style.width.%]="kpi.trendPercent"></div>
      </div>
    </article>
  }
</section>
