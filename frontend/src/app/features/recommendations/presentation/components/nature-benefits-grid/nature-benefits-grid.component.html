<section>
  <h4 class="mb-3 text-xl font-semibold text-slate-900">Beneficios para el ecosistema</h4>
  <div class="grid grid-cols-2 gap-3 lg:grid-cols-3">
    @for (benefit of benefits(); track benefit) {
      <article class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
        <span class="mb-2 inline-flex text-emerald-600">
          @switch ($index % 6) {
            @case (0) { <svg lucideRecycle class="h-5 w-5"></svg> }
            @case (1) { <svg lucideLeaf class="h-5 w-5"></svg> }
            @case (2) { <svg lucideSparkles class="h-5 w-5"></svg> }
            @case (3) { <svg lucideBadgeCheck class="h-5 w-5"></svg> }
            @case (4) { <svg lucideShieldAlert class="h-5 w-5"></svg> }
            @default { <svg lucideTrendingUp class="h-5 w-5"></svg> }
          }
        </span>
        <p class="text-sm font-medium text-slate-800">{{ benefit }}</p>
      </article>
    }
  </div>
</section>
