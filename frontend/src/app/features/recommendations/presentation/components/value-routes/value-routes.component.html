<div class="flex flex-col gap-4">
  @for (route of routes(); track route.id) {
    <app-value-route-card
      [route]="route"
      [expanded]="expandedRouteId() === route.id"
      [selected]="selectedRouteId() === route.id"
      [selectedProductId]="selectedRouteId() === route.id ? selectedProductId() : null"
      (routeToggled)="onToggleRoute($event)"
      (productSelected)="onSelectProduct($event)" />
  }
</div>
