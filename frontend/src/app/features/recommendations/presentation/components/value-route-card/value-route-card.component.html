<article
  class="rounded-3xl border bg-white p-5 shadow-sm transition-all duration-300 sm:p-6"
  [class.border-emerald-400]="selected()"
  [class.shadow-emerald-100]="selected()"
  [class.ring-2]="selected()"
  [class.ring-emerald-100]="selected()"
  [class.border-slate-200]="!selected()">
  <div class="mb-4 flex items-start justify-between gap-4">
    <button
      type="button"
      class="flex min-w-0 flex-1 items-start gap-4 text-left"
      (click)="onSelectRoute()">
      <span
        class="inline-flex h-14 w-14 shrink-0 items-center justify-center rounded-2xl"
        [class.bg-emerald-100]="selected()"
        [class.text-emerald-700]="selected()"
        [class.bg-slate-100]="!selected()"
        [class.text-slate-500]="!selected()">
        @switch (route().icon) {
          @case ('utensils') { <svg lucideUtensils class="h-7 w-7"></svg> }
          @case ('sparkles') { <svg lucideSparkles class="h-7 w-7"></svg> }
          @case ('pill') { <svg lucidePill class="h-7 w-7"></svg> }
          @case ('microscope') { <svg lucideMicroscope class="h-7 w-7"></svg> }
          @case ('zap') { <svg lucideZap class="h-7 w-7"></svg> }
          @default { <svg lucidePackage class="h-7 w-7"></svg> }
        }
      </span>
      <span class="min-w-0">
        <span class="block text-3xl font-semibold leading-tight text-slate-900 sm:text-4xl">{{ route().name }}</span>
        @if (!expanded()) {
          <span class="mt-2 block text-base text-slate-600">{{ route().description }}</span>
        }
      </span>
    </button>

    <div class="text-right">
      @if (selected()) {
        <span class="mb-2 inline-flex rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700">
          Seleccionado
        </span>
      }
      <p class="text-sm text-slate-500">Potencial Comercial</p>
      <p class="text-3xl font-semibold text-emerald-700">{{ potentialLabel[route().potential] }}</p>
    </div>
  </div>

  <div class="mb-5 flex items-center gap-3">
    <span class="text-xs font-semibold uppercase tracking-[0.16em] text-slate-500">Complejidad:</span>
    <app-value-route-complexity-badge [complexity]="route().complexity" />
  </div>

  @if (expanded()) {
    <app-value-route-products
      [products]="route().products"
      [selectedProductId]="selectedProductId()"
      (productSelected)="onSelectProduct($event)" />
  } @else {
    <div class="border-t border-slate-100 pt-4">
      <p class="mb-2 text-sm text-slate-600">{{ route().products.length }} productos potenciales</p>
      <button
        type="button"
        class="inline-flex items-center gap-2 text-sm font-semibold text-emerald-700 transition hover:text-emerald-600"
        (click)="onSelectRoute()">
        Explorar ruta
        <svg lucideArrowRight class="h-4 w-4"></svg>
      </button>
    </div>
  }
</article>
