@if (factors(); as data) {
  <section class="grid grid-cols-1 gap-4 lg:grid-cols-2">
    <article class="rounded-2xl border border-emerald-200 bg-emerald-50 p-4">
      <h4 class="inline-flex items-center gap-2 text-xl font-semibold text-emerald-800">
        <svg lucideLeaf class="h-5 w-5"></svg>
        Factores a favor
      </h4>
      <ul class="mt-3 space-y-2">
        @for (item of data.positive; track item) {
          <li class="inline-flex items-start gap-2 text-sm text-emerald-900">
            <svg lucideCheckCircle2 class="mt-0.5 h-4 w-4 shrink-0 text-emerald-600"></svg>
            <span>{{ item }}</span>
          </li>
        }
      </ul>
    </article>

    <article class="rounded-2xl border border-rose-200 bg-rose-50 p-4">
      <h4 class="inline-flex items-center gap-2 text-xl font-semibold text-rose-700">
        <svg lucideAlertTriangle class="h-5 w-5"></svg>
        Factores en contra
      </h4>
      <ul class="mt-3 space-y-2">
        @for (item of data.negative; track item) {
          <li class="inline-flex items-start gap-2 text-sm text-rose-900">
            <span class="mt-1 inline-block h-2 w-2 shrink-0 rounded-full bg-rose-400"></span>
            <span>{{ item }}</span>
          </li>
        }
      </ul>
    </article>
  </section>
}
