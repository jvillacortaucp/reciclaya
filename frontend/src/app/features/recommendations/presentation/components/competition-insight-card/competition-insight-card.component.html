@if (insight(); as data) {
  <article class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
    <div class="flex flex-wrap items-center justify-between gap-3">
      <h3 class="text-2xl font-semibold text-slate-900">Análisis de competencia</h3>
      <span class="rounded-full bg-emerald-100 px-3 py-1 text-sm font-semibold text-emerald-700">
        {{ data.competitionLevelLabel }}
      </span>
    </div>

    <div class="mt-4 grid gap-4 md:grid-cols-2">
      <div>
        <p class="text-sm font-semibold text-slate-700">Sustitutos directos</p>
        <ul class="mt-3 space-y-2">
          @for (substitute of data.directSubstitutes; track substitute) {
            <li class="flex items-start gap-2 text-sm text-slate-700">
              <svg lucideAlertTriangle class="mt-0.5 h-4 w-4 shrink-0 text-amber-500"></svg>
              <span>{{ substitute }}</span>
            </li>
          }
        </ul>
      </div>

      <div class="rounded-2xl border border-emerald-200 bg-emerald-50 p-4">
        <p class="text-sm font-semibold text-emerald-800">Posicionamiento recomendado</p>
        <p class="mt-2 text-sm leading-relaxed text-emerald-800">
          "{{ data.positioningRecommendation }}"
        </p>
      </div>
    </div>
  </article>
}
