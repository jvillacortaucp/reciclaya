<section class="grid grid-cols-1 gap-6 xl:grid-cols-[minmax(0,1fr)_360px]">
  <div class="flex flex-col min-w-0 space-y-6">
    <header class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
      <div class="flex flex-wrap items-center justify-between gap-2">
        <h2 class="text-3xl font-semibold text-slate-900 sm:text-4xl">Proceso de fabricación</h2>
        <div class="flex flex-wrap items-center gap-2">
          <span class="rounded-full border border-emerald-200 bg-emerald-50 px-3 py-1 text-sm font-medium text-emerald-700">
            {{ recommendation().recommendedProduct }}
          </span>
          <span class="rounded-full border border-slate-200 bg-slate-100 px-3 py-1 text-sm font-medium text-slate-600">
            Residuo base: {{ recommendation().baseResidue }}
          </span>
        </div>
      </div>
      <p class="mt-2 text-sm text-slate-600 sm:text-base">
        Comprende qué ocurre en cada etapa, cómo se transforma el residuo y cuál es su impacto técnico y ambiental.
      </p>
    </header>

    <app-explanation-step-selector
      [steps]="recommendation().explanationSteps"
      [selectedStepId]="selectedStepId()"
      (stepSelected)="onStepSelected($event)" />

    <app-explanation-detail-card [step]="selectedStep()" />

    <div data-tour="explanation-factors">
      <app-environmental-factors-card [factors]="selectedStep()?.environmentalFactors ?? null" />
    </div>

    <div data-tour="explanation-benefits">
      <app-nature-benefits-grid [benefits]="selectedStep()?.natureBenefits ?? []" />
    </div>
  </div>

  <div class="min-w-0">
    <app-environmental-summary-card [summary]="environmentalSummary()" />
  </div>
</section>
