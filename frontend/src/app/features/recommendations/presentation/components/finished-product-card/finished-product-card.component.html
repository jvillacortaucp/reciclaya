@if (product(); as item) {
  <article data-tour="market-finished-product" class="rounded-3xl border border-slate-200 bg-white shadow-sm">
    <div class="grid min-w-0 grid-cols-1 overflow-hidden rounded-3xl md:grid-cols-[240px_minmax(0,1fr)]">
      <div class="relative h-52 md:h-full">
        <img
          [src]="item.productImageUrl || fallbackImage"
          [alt]="item.name"
          class="h-full w-full object-cover"
          loading="lazy" />
      </div>

      <div class="min-w-0 p-5">
        <div class="flex flex-wrap items-start justify-between gap-3">
          <h3 class="text-2xl font-semibold text-slate-900">{{ item.name }}</h3>
          <span
            class="inline-flex items-center rounded-full bg-emerald-600 px-3 py-1 text-xs font-semibold uppercase tracking-[0.08em] text-white">
            {{ item.opportunityTag }}
          </span>
        </div>

        <div class="mt-4 grid gap-3 sm:grid-cols-2">
          <div class="rounded-2xl bg-slate-50 p-3">
            <p class="text-xs uppercase tracking-[0.12em] text-slate-500">Uso principal</p>
            <p class="mt-1 text-base font-medium text-slate-900">{{ item.useCase }}</p>
          </div>
          <div class="rounded-2xl bg-slate-50 p-3">
            <p class="text-xs uppercase tracking-[0.12em] text-slate-500">Formato sugerido</p>
            <p class="mt-1 text-base font-medium text-slate-900">{{ item.suggestedFormat }}</p>
          </div>
        </div>

        <div class="mt-4 flex flex-wrap items-center justify-between gap-3 border-t border-slate-100 pt-4">
          <div class="inline-flex items-center gap-2 text-slate-600">
            <svg lucideCircleDollarSign class="h-5 w-5 text-emerald-600"></svg>
            <span class="text-sm">Precio sugerido</span>
          </div>
          <p class="text-3xl font-semibold text-slate-900">
            S/ {{ item.suggestedPricePerKg | number: '1.2-2' }}
            <span class="text-xl font-medium text-slate-500">/kg</span>
          </p>
        </div>
      </div>
    </div>
  </article>
}
