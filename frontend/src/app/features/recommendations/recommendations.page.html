<section class="mx-auto w-full max-w-[1680px] overflow-x-hidden px-4 pb-10 pt-6 sm:px-6 lg:px-8">
  <div class="grid gap-6 xl:grid-cols-[minmax(0,1fr)_420px]">
    <div class="min-w-0 space-y-6">
      <header class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
        <div class="flex flex-wrap items-center justify-between gap-4">
          <div>
            <p class="text-xs font-semibold uppercase tracking-[0.16em] text-slate-500">Ruta de valor</p>
            <p class="mt-1 text-sm font-medium text-emerald-700">Explorador</p>
            <h1 class="mt-3 text-5xl font-semibold leading-tight text-emerald-700">{{ text.title }}</h1>
          </div>

          <div class="flex flex-wrap items-center gap-3">
            <span
              class="inline-flex items-center gap-2 rounded-full border border-emerald-200 bg-emerald-50 px-5 py-2 text-xl font-medium text-emerald-700">
              <svg lucideLeaf class="h-5 w-5"></svg>
              {{ text.baseResidueLabel }}
            </span>
            <span class="rounded-full bg-indigo-50 px-4 py-2 text-sm font-semibold text-indigo-700">
              {{ text.helperLabel }}
            </span>
            <button
              type="button"
              class="inline-flex h-11 w-11 items-center justify-center rounded-xl text-slate-500 transition hover:bg-slate-100 hover:text-slate-700">
              <svg lucideBell class="h-5 w-5"></svg>
            </button>
            <button
              type="button"
              class="inline-flex h-11 w-11 items-center justify-center rounded-xl text-slate-500 transition hover:bg-slate-100 hover:text-slate-700">
              <svg lucideSettings class="h-5 w-5"></svg>
            </button>
          </div>
        </div>
      </header>

      <p class="text-[28px] leading-snug text-slate-700">
        {{ text.intro }}
      </p>

      @if (loading()) {
        <div class="space-y-5">
          <div class="animate-pulse rounded-3xl border border-slate-200 bg-white p-6">
            <div class="mb-5 h-8 w-1/3 rounded-xl bg-slate-200"></div>
            <div class="mb-3 h-5 w-3/4 rounded-xl bg-slate-200"></div>
            <div class="h-24 rounded-2xl bg-slate-100"></div>
          </div>
          <div class="grid grid-cols-1 gap-5 lg:grid-cols-2">
            <div class="animate-pulse rounded-3xl border border-slate-200 bg-white p-6">
              <div class="h-36 rounded-2xl bg-slate-100"></div>
            </div>
            <div class="animate-pulse rounded-3xl border border-slate-200 bg-white p-6">
              <div class="h-36 rounded-2xl bg-slate-100"></div>
            </div>
          </div>
        </div>
      } @else if (!routes().length) {
        <div class="rounded-3xl border border-dashed border-slate-300 bg-white p-8 text-center">
          <p class="text-lg font-semibold text-slate-700">No encontramos rutas de valor para este residuo.</p>
          <p class="mt-2 text-sm text-slate-500">Actualiza los datos de entrada para volver a intentarlo.</p>
        </div>
      } @else {
        <app-value-routes
          [routes]="routes()"
          [selectedRouteId]="selectedRouteId()"
          [selectedProductId]="selectedProductId()"
          [expandedRouteId]="expandedRouteId()"
          (routeSelected)="onRouteSelected($event)"
          (productSelected)="onProductSelected($event)" />
      }
    </div>

    <div class="min-w-0">
      <app-value-route-summary [summary]="summary()" [completion]="completion()" />
    </div>
  </div>
</section>
